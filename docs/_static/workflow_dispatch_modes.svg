     x="110"
     y="448"
     class="text"
     id="text12">Edit script variables and run file manually</text>
  <text
     x="110"
     y="478"
     class="small"
     id="text13">Good for exploratory edits and one off runs</text>
  <text
     x="110"
     y="508"
     class="small"
     id="text14">Example: python my_workflow.py</text>
  <text
     x="110"
     y="753"
     class="small"
