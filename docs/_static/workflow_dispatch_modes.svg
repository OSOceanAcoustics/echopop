  <text
     x="1250"
     y="475"
     class="laneTitle"
     id="text24">JSON or YAML configuration</text>
  <text
     x="1250"
     y="508"
     class="text"
     id="text25">Store parameters outside code in config files</text>
  <text
     x="1250"
     y="538"
     class="small"
     id="text26">Good for scenario management and reproducibility</text>
  <text
     x="900"
     y="205"
     text-anchor="middle"
     class="laneTitle"
     id="text8">Echopop workflow script</text>
  <text
     x="900"
     y="238"
     text-anchor="middle"
     class="text"
     id="text9">modular stages: ingestion, conditioning, estimation, reporting</text>
  <text
     x="900"
     y="268"
     text-anchor="middle"
     class="small"
     id="text10">same core logic can be dispatched through different interfaces</text>
  <text
     x="1250"
     y="568"
     class="small"
     id="text27">Can be used with or without CLI integration</text>
  <text
     x="1250"
     y="598"
     class="small"
     id="text28">Example: workflow reads config then runs</text>
  <text
     x="1250"
     y="628"
     class="small"
     id="text29">config.json or config.yaml</text>
  <rect
     class="modeE"
     x="1220"
     y="760"
     width="500"
     height="250"
     rx="16"
     ry="16"
     id="rect29" />
  <text
     x="1250"
     y="805"
     class="laneTitle"
     id="text30">External orchestrators</text>
  <text
     x="1250"
     y="838"
     class="text"
     id="text31">Use tools such as Prefect for scheduling and retries</text>
  <text
     x="1250"
     y="868"
     class="small"
     id="text32">Good for pipelines, monitoring, and multi run automation</text>
  <text
     x="1250"
     y="898"
     class="small"
     id="text33">Can dispatch script, notebook, or CLI commands</text>
  <text
     x="1250"
     y="928"
     class="small"
     id="text34">Adds execution control around the same workflow logic</text>
  <text
     x="1250"
     y="958"
     class="small"
     id="text35">Example: scheduled yearly runs with logging</text>
