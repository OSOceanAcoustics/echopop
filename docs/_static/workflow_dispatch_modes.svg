  <text
     x="110"
     y="905"
     class="laneTitle"
     id="text19">CLI hooks</text>
  <text
     x="110"
     y="938"
     class="text"
     id="text20">Launch workflow with command line arguments</text>
  <text
     x="110"
     y="968"
     class="small"
     id="text21">Good for repeatable terminal usage and batch scripts</text>
  <text
     x="110"
     y="998"
     class="small"
     id="text22">Example: --year, --verbose, custom flags</text>
  <text
     x="110"
     y="1028"
     class="small"
     id="text23">Hooks map runtime options into workflow variables</text>
